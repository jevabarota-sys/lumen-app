name: lumen
description: "Lumen: Your Personalized Growth Compass - A cross-platform mobile app for personal growth through numerology, tarot, and AI-powered reflection."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  supabase_flutter: ^2.0.0
  
  json_annotation: ^4.8.1
  
  flutter_stripe: ^10.1.1
  in_app_purchase: ^3.1.11
  
  http: ^1.1.2
  dio: ^5.4.0
  
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  intl: ^0.19.0
  
  lottie: ^2.7.0
  flutter_animate: ^4.3.0
  
  go_router: ^12.1.3
  
  uuid: ^4.2.1
  crypto: ^3.0.3
  
  markdown: ^7.1.1
  
  cached_network_image: ^3.3.0
  
  device_info_plus: ^9.1.1
  package_info_plus: ^4.2.0

dependency_overrides:
  # Override app_links to avoid hardcoded AGP version issue in 6.4.1
  # See: https://github.com/llfbandit/app_links/issues/226
  app_links: 6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/tarot/
    - assets/angel_cards/
    - assets/animations/
